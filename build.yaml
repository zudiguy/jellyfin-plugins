overview: "Automatically overlays quality badges on media posters - .strm file support"
description: |
  JellyTag automatically overlays quality badges (resolution, HDR, codec, audio, source) on your media posters and thumbnails.

  Key Features:
  - Parses .strm filenames to extract metadata
  - Multi-category badge support (resolution, HDR, codecs, audio, source)
  - Customizable badge positioning and styling
  - Server-side rendering for all clients
  - Per-library filtering

  Modified specifically to support .strm files by parsing filenames instead of relying on Jellyfin metadata.
